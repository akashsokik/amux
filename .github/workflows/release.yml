name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release 2>&1

      - name: Create app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          APP_DIR="amux.app"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          cp .build/release/amux "$MACOS_DIR/amux"

          cat > "$CONTENTS_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>amux</string>
              <key>CFBundleIdentifier</key>
              <string>com.amux.app</string>
              <key>CFBundleName</key>
              <string>amux</string>
              <key>CFBundleDisplayName</key>
              <string>amux</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${APP_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${BUILD_NUMBER}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Copy shell integration resources
          GHOSTTY_RES="$RESOURCES_DIR/ghostty/shell-integration"
          mkdir -p "$GHOSTTY_RES"
          SHELL_INTEG_SRC="vendor/ghostty-dist/shell-integration"
          for shell_dir in bash zsh fish elvish nushell; do
            if [ -d "$SHELL_INTEG_SRC/$shell_dir" ]; then
              cp -R "$SHELL_INTEG_SRC/$shell_dir" "$GHOSTTY_RES/"
            fi
          done

          # Copy terminfo
          TERMINFO_SRC="vendor/ghostty-dist/terminfo"
          if [ -d "$TERMINFO_SRC" ]; then
            cp -R "$TERMINFO_SRC" "$RESOURCES_DIR/"
          fi

      - name: Create release archive
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          zip -r "amux-${APP_VERSION}-macos-arm64.zip" amux.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: amux-${{ steps.version.outputs.version }}-macos-arm64.zip
